<!DOCTYPE html>
<html lang="en">
<head>
  <script type="importmap">{ "imports": { "boredom": "./boreDOM.js" } }</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miniray - WGSL Minifier</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
@layer components {
  miniray-minifier {
    display: block;
  }

  .minifier {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
  }

  /* Editor wrapper for overlay positioning */
  .editor-wrapper {
    position: relative;
  }

  /* Loading state - overlay on editor */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--spacing-md);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    font-family: var(--font-mono);
    font-size: var(--font-size-sm);
    z-index: 10;
    opacity: 1;
    transition: opacity 0.3s ease-out;
  }

  .loading.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .loading[hidden] {
    display: none;
  }

  .loading-indicator {
    display: flex;
    gap: 6px;
  }

  .loading-dot {
    width: 6px;
    height: 6px;
    background: var(--color-primary);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Editor grid */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--color-border);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  @media (max-width: 640px) {
    .editor-grid {
      grid-template-columns: 1fr;
    }
  }

  .editor-pane {
    display: flex;
    flex-direction: column;
    background: var(--color-surface);
  }

  .pane-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--spacing-xs) var(--spacing-sm);
    background: var(--color-surface-alt);
    border-bottom: 1px solid var(--color-border);
    min-height: 32px;
  }

  .pane-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-text-muted);
    letter-spacing: 0.02em;
  }

  .pane-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-text-muted);
    opacity: 0.7;
  }

  .pane-actions {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
  }

  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--color-text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }

  .action-btn:hover {
    color: var(--color-text);
    background: var(--color-primary-alpha);
  }

  .action-btn:active {
    transform: scale(0.97);
  }

  .action-btn svg {
    flex-shrink: 0;
  }

  .editor-pane textarea {
    flex: 1;
    min-height: 200px;
    padding: var(--spacing-sm);
    border: none;
    background: var(--color-surface);
    color: var(--color-text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
    resize: vertical;
    tab-size: 2;
  }

  .editor-pane textarea:focus {
    outline: none;
  }

  .output-pane textarea {
    background: var(--color-surface-alt);
    color: var(--color-text-muted);
  }

  /* Diagnostics panel */
  .diagnostics-panel {
    display: flex;
    flex-direction: column;
    gap: 1px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .diagnostic-item {
    display: flex;
    align-items: flex-start;
    gap: var(--spacing-sm);
    padding: var(--spacing-xs) var(--spacing-sm);
    background: var(--color-surface);
  }

  .diagnostic-item.error {
    background: var(--color-error-bg);
  }

  .diagnostic-item.warning {
    background: var(--color-warning-bg);
  }

  .diagnostic-badge {
    flex-shrink: 0;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .diagnostic-badge.error {
    background: var(--color-error);
    color: #fff;
  }

  .diagnostic-badge.warning {
    background: var(--color-warning);
    color: #000;
  }

  .diagnostic-location {
    flex-shrink: 0;
    color: var(--color-text-muted);
    min-width: 4ch;
  }

  .diagnostic-message {
    flex: 1;
    color: var(--color-text);
    line-height: 1.4;
  }

  .diagnostic-code {
    flex-shrink: 0;
    color: var(--color-text-muted);
    font-size: 10px;
  }

  .diagnostic-code-btn {
    flex-shrink: 0;
    padding: 1px 6px;
    border: 1px solid var(--color-border);
    border-radius: 3px;
    background: var(--color-surface-alt);
    color: var(--color-text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .diagnostic-code-btn:hover {
    border-color: var(--color-primary);
    color: var(--color-primary);
    background: var(--color-primary-alpha);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-sm);
  }

  .options-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: var(--color-surface);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-text-muted);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }

  .chip:hover {
    border-color: var(--color-text-muted);
  }

  .chip:has(input:checked) {
    border-color: var(--color-primary);
    background: var(--color-primary-alpha);
    color: var(--color-text);
  }

  .chip input[type="checkbox"] {
    display: none;
  }

  .chip:has(input:checked)::before {
    content: "✓";
    font-size: 10px;
    color: var(--color-primary);
  }

  .divider {
    width: 1px;
    height: 16px;
    background: var(--color-border);
    margin: 0 4px;
  }

  @media (max-width: 640px) {
    .divider {
      display: none;
    }
  }

  .preset-chip {
    gap: 6px;
  }

  .preset-chip span {
    color: var(--color-text-muted);
  }

  .preset-chip select {
    padding: 0;
    border: none;
    background: transparent;
    color: var(--color-text);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }

  .preset-chip select:focus {
    outline: none;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-xs) 0;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .stat {
    color: var(--color-text-muted);
  }

  .stat-arrow {
    color: var(--color-border);
  }

  .stat-savings {
    color: var(--color-success);
    font-weight: 600;
  }

  /* Reflection container */
  .reflection-container {
    border-top: 1px solid var(--color-border);
    padding-top: var(--spacing-md);
  }

  .reflection-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px 6px 8px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    color: var(--color-text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .reflection-toggle:hover {
    border-color: var(--color-text-muted);
    color: var(--color-text);
  }

  .reflection-toggle[aria-expanded="true"] {
    border-color: var(--color-primary);
    color: var(--color-text);
  }

  .toggle-icon {
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }

  .reflection-toggle[aria-expanded="true"] .toggle-icon {
    transform: rotate(90deg);
  }

  .reflection-meta {
    opacity: 0.6;
    font-size: 10px;
  }

  /* Reflection panel */
  .reflection-panel {
    margin-top: var(--spacing-sm);
    animation: slideDown 0.2s ease;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .reflection-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: var(--spacing-md);
  }

  .reflection-section {
    min-width: 0;
  }

  .section-header {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-muted);
    margin-bottom: var(--spacing-xs);
  }

  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .reflection-section table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
  }

  .reflection-section th,
  .reflection-section td {
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid var(--color-border);
    white-space: nowrap;
  }

  .reflection-section th {
    background: var(--color-surface-alt);
    font-weight: 500;
    color: var(--color-text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .reflection-section tr:last-child td {
    border-bottom: none;
  }

  .reflection-section code {
    color: var(--color-primary);
  }

  .reflection-section .empty {
    color: var(--color-text-muted);
    font-style: italic;
    text-align: center;
  }

  /* Error codes modal */
  .error-codes-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--spacing-md);
  }

  .error-codes-modal[hidden] {
    display: none;
  }

  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(2px);
  }

  .modal-content {
    position: relative;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from {
      opacity: 0;
      transform: scale(0.96) translateY(8px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--spacing-sm) var(--spacing-md);
    border-bottom: 1px solid var(--color-border);
    background: var(--color-surface-alt);
  }

  .modal-header h2 {
    margin: 0;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text);
  }

  .modal-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }

  .modal-close:hover {
    color: var(--color-text);
    background: var(--color-primary-alpha);
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: var(--spacing-md);
  }

  .error-code-category {
    margin-bottom: var(--spacing-lg);
  }

  .error-code-category:last-child {
    margin-bottom: 0;
  }

  .category-header {
    margin: 0 0 var(--spacing-sm) 0;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-primary);
    padding-bottom: var(--spacing-xs);
    border-bottom: 1px solid var(--color-border);
  }

  .error-code-item {
    padding: var(--spacing-sm);
    border-radius: var(--radius-sm);
    margin-bottom: var(--spacing-xs);
    transition: background 0.15s;
  }

  .error-code-item:last-child {
    margin-bottom: 0;
  }

  .error-code-item:hover {
    background: var(--color-surface-alt);
  }

  .error-code-item.highlighted {
    background: var(--color-primary-alpha);
    border: 1px solid var(--color-primary);
  }

  .error-code-header {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    margin-bottom: 4px;
  }

  .error-code-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--color-surface-alt);
    color: var(--color-text);
  }

  .error-code-item.highlighted .error-code-badge {
    background: var(--color-primary);
    color: #fff;
  }

  .error-code-title {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text);
  }

  .error-code-spec {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-text-muted);
    margin-left: auto;
  }

  .error-code-description {
    margin: 0;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.5;
    color: var(--color-text-muted);
  }

  @media (max-width: 640px) {
    .error-codes-modal {
      padding: 0;
    }

    .modal-content {
      max-height: 100vh;
      border-radius: 0;
    }
  }
}
  </style>
  <script src="./main.js" type="module"></script>
</head>
<body>
  <header>
    <h1>miniray</h1>
    <p>WGSL Minifier - Compress your WebGPU shaders</p>
  </header>
  <main>
    <miniray-minifier></miniray-minifier>

    <section class="cli-section">
      <h2>Also available on the command line</h2>
      <p>Minify WGSL shaders directly from your terminal with a single command:</p>
      <pre><code>npx miniray shader.wgsl -o shader.min.wgsl</code></pre>
    </section>
  </main>
  <footer>
    <a href="https://github.com/HugoDaniel/miniray" target="_blank" rel="noopener">Source</a>
    <span class="separator"></span>
    <p>Made with&nbsp;<a href="https://hugodaniel.com/pages/boreDOM/">boreDOM</a> <span class="sleepy">🥱</span></p>
  </footer>

  <template data-component="miniray-minifier">
  <div class="minifier">
    <div class="editor-wrapper">
      <div data-ref="loading" class="loading">
        <div class="loading-indicator">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
        <span>Initializing WASM runtime...</span>
      </div>

      <div class="editor-grid">
        <div class="editor-pane">
          <div class="pane-bar">
            <span class="pane-label">input.wgsl</span>
            <span class="pane-meta" data-ref="inputSize"></span>
          </div>
          <textarea
            data-ref="input"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            oninput="['inputChange']"
          ></textarea>
        </div>

        <div class="editor-pane output-pane">
          <div class="pane-bar">
            <span class="pane-label">output.min.wgsl</span>
            <div class="pane-actions">
              <span class="pane-meta" data-ref="outputSize"></span>
              <button class="action-btn" onclick="['copy']" data-ref="copyBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                Copy
              </button>
            </div>
          </div>
          <textarea
            data-ref="output"
            readonly
            spellcheck="false"
            onclick="['selectOutput']"
          ></textarea>
        </div>
      </div>
    </div>

    <div data-ref="diagnostics" class="diagnostics-panel" hidden></div>

    <div data-ref="errorCodesModal" class="error-codes-modal" hidden>
        <div class="modal-backdrop" onclick="['closeErrorCodes']"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h2>Diagnostic Error Codes</h2>
            <button class="modal-close" onclick="['closeErrorCodes']">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="modal-body" data-ref="errorCodesList"></div>
        </div>
      </div>

      <div class="toolbar">
        <div class="options-row">
          <label class="chip">
            <input type="checkbox" data-ref="whitespace" onchange="['optionChange']" />
            <span>Whitespace</span>
          </label>
          <label class="chip">
            <input type="checkbox" data-ref="identifiers" onchange="['optionChange']" />
            <span>Identifiers</span>
          </label>
          <label class="chip">
            <input type="checkbox" data-ref="syntax" onchange="['optionChange']" />
            <span>Syntax</span>
          </label>
          <label class="chip">
            <input type="checkbox" data-ref="mangle" onchange="['optionChange']" />
            <span>Mangle</span>
          </label>
          <div class="divider"></div>
          <label class="chip preset-chip">
            <span>Preset:</span>
            <select data-ref="preset" onchange="['presetChange']">
              <option value="default">Default</option>
              <option value="compute.toys">compute.toys</option>
            </select>
          </label>
        </div>

        <div data-ref="stats" class="stats-row" hidden>
          <span class="stat" data-ref="original"></span>
          <span class="stat-arrow">→</span>
          <span class="stat" data-ref="minified"></span>
          <span class="stat stat-savings" data-ref="savings"></span>
        </div>
      </div>

      <div data-ref="reflectionContainer" class="reflection-container" hidden>
        <button class="reflection-toggle" onclick="['toggleReflection']" data-ref="reflectionToggle">
          <svg class="toggle-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span>Shader Reflection</span>
          <span class="reflection-meta" data-ref="reflectionMeta"></span>
        </button>

        <div data-ref="reflection" class="reflection-panel" hidden>
          <div class="reflection-grid">
            <div class="reflection-section">
              <div class="section-header">Bindings</div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>G</th>
                      <th>B</th>
                      <th>Name</th>
                      <th>Type</th>
                      <th>Size</th>
                    </tr>
                  </thead>
                  <tbody data-ref="bindingsBody"></tbody>
                </table>
              </div>
            </div>

            <div class="reflection-section">
              <div class="section-header">Entry Points</div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Stage</th>
                      <th>Workgroup</th>
                    </tr>
                  </thead>
                  <tbody data-ref="entryPointsBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>
  <script src="./miniray-minifier.js" type="module"></script>
</body>
</html>
